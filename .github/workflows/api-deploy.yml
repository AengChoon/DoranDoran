name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/api-deploy.yml"
  workflow_dispatch:

concurrency:
  group: api-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  # aws-actions/configure-aws-credentials 등 Node 20 액션을 Node 24로 강제.
  # 2026-06-02부터 Node 24가 기본, 2026-09-16에 Node 20 제거 예정.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # EC2에서 git pull → pnpm install → systemctl restart
      - name: Trigger deploy via SSM
        id: ssm
        env:
          DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          REPO_PATH: ${{ secrets.API_REPO_PATH }}
          SERVICE_NAME: ${{ secrets.API_SERVICE_NAME }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.API_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "{\"commands\":[
              \"set -e\",
              \"cd $REPO_PATH\",
              \"sudo -u $DEPLOY_USER git pull --ff-only\",
              \"sudo -u $DEPLOY_USER pnpm --filter @dorandoran/api install --no-frozen-lockfile 2>&1 | tail -5\",
              \"sudo systemctl restart $SERVICE_NAME\",
              \"sleep 3\",
              \"sudo systemctl is-active $SERVICE_NAME\"
            ]}" \
            --query "Command.CommandId" --output text)
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM command: $CMD_ID"

      - name: Wait for SSM command
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id ${{ steps.ssm.outputs.cmd_id }} \
              --instance-id ${{ secrets.API_INSTANCE_ID }} \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] status=$STATUS"
            if [ "$STATUS" = "Success" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "=== command output ==="
              aws ssm get-command-invocation \
                --command-id ${{ steps.ssm.outputs.cmd_id }} \
                --instance-id ${{ secrets.API_INSTANCE_ID }} \
                --query "{Status:Status, Out:StandardOutputContent, Err:StandardErrorContent}" --output json
              exit 1
            fi
            sleep 5
          done
          echo "::error::SSM command timed out after 150s"
          exit 1

      - name: Print deploy log
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id ${{ steps.ssm.outputs.cmd_id }} \
            --instance-id ${{ secrets.API_INSTANCE_ID }} \
            --query "StandardOutputContent" --output text
